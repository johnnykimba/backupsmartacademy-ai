  .header{background:linear-gradient(135deg,#0f2044,#1a3a6e);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(6,182,212,0.2);}
  .header-left{display:flex;align-items:center;gap:10px;}
  .header a{color:#06b6d4;text-decoration:none;font-size:20px;font-weight:700;}
  .header h1{color:#fff;font-size:16px;font-weight:800;}
  .help-badge{background:#ef4444;color:#fff;font-size:12px;font-weight:900;padding:3px 9px;border-radius:6px;}
  .lang-select{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:5px 8px;border-radius:8px;font-size:12px;cursor:pointer;}
  .lang-select option{background:#0f2044;color:#fff;}
  .topics{padding:10px 14px 0;display:flex;gap:6px;flex-wrap:wrap;}
  .topic-btn{background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.3);color:#06b6d4;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .topic-btn:active{background:rgba(6,182,212,0.3);}
  .chat-wrap{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;padding-bottom:130px;}
  .msg{display:flex;gap:8px;align-items:flex-start;}
  .msg.user{flex-direction:row-reverse;}
  .avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .avatar.ai{background:linear-gradient(135deg,#1a56db,#06b6d4);}
  .avatar.user{background:linear-gradient(135deg,#7c3aed,#a855f7);}
  .bubble{max-width:88%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.7;}
  .bubble.ai{background:#162036;border:1px solid rgba(6,182,212,0.15);color:#e2e8f0;border-radius:4px 14px 14px 14px;}
  .bubble.user{background:linear-gradient(135deg,#1a56db,#1d4ed8);color:#fff;border-radius:14px 4px 14px 14px;}
  .bubble strong{color:#06b6d4;}
  .bubble .step{background:rgba(6,182,212,0.1);border-left:3px solid #06b6d4;padding:6px 10px;margin:5px 0;border-radius:0 6px 6px 0;font-size:13px;}
  .speak-btn{background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:12px;margin-top:6px;padding:2px 6px;border-radius:4px;display:block;}
  .speak-btn:hover{color:#06b6d4;}
  .typing{display:flex;align-items:center;gap:4px;padding:8px 12px;}
  .typing span{width:7px;height:7px;border-radius:50%;background:#06b6d4;animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
  .input-bar{position:fixed;bottom:0;left:0;right:0;background:#0f1a2e;border-top:1px solid rgba(255,255,255,0.08);padding:10px 12px;display:flex;gap:8px;align-items:center;}
  .input-bar textarea{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:14px;padding:10px 13px;resize:none;font-family:inherit;max-height:90px;min-height:42px;line-height:1.5;}
  .input-bar textarea:focus{outline:none;border-color:#06b6d4;}
  .input-bar textarea::placeholder{color:rgba(255,255,255,0.35);}
  .btn-send{width:42px;height:42px;background:linear-gradient(135deg,#1a56db,#06b6d4);border:none;border-radius:12px;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;}
  .btn-mic{width:42px;height:42px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:all 0.2s;}
  .btn-mic.active{background:rgba(239,68,68,0.2);border-color:#ef4444;color:#ef4444;}
  .btn-ar{height:42px;padding:0 10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:rgba(255,255,255,0.5);font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap;}
  .btn-ar.on{background:rgba(16,185,129,0.2);border-color:#10b981;color:#10b981;}
  .welcome{text-align:center;padding:24px 16px;}
  .welcome-icon{font-size:44px;margin-bottom:10px;}
  .welcome h2{color:#fff;font-size:18px;font-weight:800;margin-bottom:6px;}
  .welcome p{color:rgba(255,255,255,0.5);font-size:13px;line-height:1.6;}

var LANG_VOICE_CODE = {en:'en-GB',fr:'fr-FR',pt:'pt-PT',es:'es-ES',sw:'sw-KE',ha:'ha-NG',yo:'yo-NG',ig:'ig-NG',zu:'zu-ZA',af:'af-ZA',hi:'hi-IN',zh:'zh-CN',ru:'ru-RU',de:'de-DE',it:'it-IT',id:'id-ID',tr:'tr-TR',bn:'bn-BD',tl:'fil-PH',ar:'ar-SA'};

function setHelpLang(lang){
  _helpLang = lang;
  var L = T[lang] || T.en;
  document.getElementById('welcome-title').textContent = L.welcome;
  document.getElementById('welcome-sub').textContent = L.sub;
  document.getElementById('help-input').placeholder = L.placeholder;
  // Rebuild topic buttons
  var topicsEl = document.getElementById('help-topics');
  topicsEl.innerHTML = '';
  L.topics.forEach(function(label, i){
    var btn = document.createElement('button');
    btn.className = 'topic-btn';
    btn.textContent = label;
    btn.onclick = function(){
      sendHelp(L.topicQ[i]);
      setTimeout(function(){
        var wrap = document.getElementById('chat-wrap');
        if(wrap) wrap.scrollTop = wrap.scrollHeight;
      }, 100);
    };
    topicsEl.appendChild(btn);
  });
  // Update mic lang
  if(_recognition) _recognition.lang = LANG_VOICE_CODE[lang]||'en-GB';
  // Update select
  document.getElementById('help-lang').value = lang;
}

// Auto-detect language from main app localStorage
(function(){
  try{
    var saved = localStorage.getItem('sa_lang') || localStorage.getItem('saa_lang') || 'en';
    // Map main app lang codes to help lang codes
    var map = {en:'en',fr:'fr',pt:'pt',es:'es',sw:'sw',ha:'ha',yo:'yo',ig:'ig',zu:'zu',af:'af',hi:'hi',zh:'zh',ru:'ru',de:'de',it:'it',id:'id',tr:'tr',bn:'bn',tl:'tl',ar:'ar'};
    var lang = map[saved] || 'en';
    setHelpLang(lang);
  }catch(e){ setHelpLang('en'); }
})();

// ── AUTO-READ ─────────────────────────────────────────────────
function toggleAR(){
  _autoRead = !_autoRead;
  var btn = document.getElementById('btn-ar');
  btn.textContent = _autoRead ? '🔊 Auto' : '🔇 Auto';
  btn.classList.toggle('on', _autoRead);
  if(!_autoRead && window.speechSynthesis) window.speechSynthesis.cancel();
}

function speakNow(text){
  if(!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var clean = text
    .replace(/<[^>]*>/g,'')
    .replace(/\*\*/g,'').replace(/\*/g,'').replace(/#+\s*/g,'')
    .replace(/[\u{1F300}-\u{1FFFF}]/gu,'')
    .replace(/[\u{2600}-\u{27BF}]/gu,'')
    .replace(/[💳📱📚🎓👤✅❌⚠️🔑📄🌍⏱🧑‍🏫→←↓↑★☆•·]/g,'')
    .replace(/\s{2,}/g,' ')
    .trim();
  if(!clean) return;
  var utt = new SpeechSynthesisUtterance(clean);
  utt.lang = LANG_VOICE_CODE[_helpLang] || 'en-GB';
  utt.rate = 0.92; utt.pitch = 1; utt.volume = 1;
  var voices = window.speechSynthesis.getVoices();
  var code = (LANG_VOICE_CODE[_helpLang]||'en-GB').toLowerCase();
  var pick = voices.find(function(v){return v.lang.toLowerCase()===code&&v.localService;})
          || voices.find(function(v){return v.lang.toLowerCase().startsWith(code.split('-')[0])&&v.localService;})
          || voices.find(function(v){return v.lang.toLowerCase().startsWith(code.split('-')[0]);})
          || voices.find(function(v){return v.lang.startsWith('en');});
  if(pick) utt.voice = pick;
  window.speechSynthesis.speak(utt);
}

// ── SCROLL HELPERS ───────────────────────────────────────────
function scrollToChat(){
  var wrap = document.getElementById('chat-wrap');
  if(wrap) wrap.scrollTop = wrap.scrollHeight;
}
function scrollToBottom(){
  var wrap = document.getElementById('chat-wrap');
  if(wrap) wrap.scrollTop = wrap.scrollHeight;
}

// ── SEND ─────────────────────────────────────────────────────
async function sendHelp(text){
  var input = document.getElementById('help-input');
  var q = (text || input.value).trim();
  if(!q) return;
  // Hide welcome message on first interaction
  var welcome = document.querySelector('.welcome');
  if(welcome) welcome.style.display = 'none';
  hideTyping();
  input.value = '';
  autoResize(input);
  addMsg('user', q);
  var wrap = document.getElementById('chat-wrap');
  if(wrap) wrap.scrollTop = wrap.scrollHeight;
  showTyping();
  try{
    var res = await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({_appSecret:APP_SECRET, action:'help-chat', question:q, lang:_helpLang})
    });
    var data = await res.json();
    hideTyping();
    var answer = (data.answer||'').trim() || 'Please WhatsApp +27761328664 for help.';
    var id = addMsg('ai', answer);
    scrollToBottom();
    if(_autoRead) speakNow(_msgTexts[id]);
  }catch(e){
    hideTyping();
    var L = T[_helpLang]||T.en;
    addMsg('ai','Could not connect. WhatsApp +27761328664 📱');
    scrollToBottom();
  }
}

// ── ADD MESSAGE ──────────────────────────────────────────────
function addMsg(role, text){
  var wrap = document.getElementById('chat-wrap');
  var id = 'msg-'+(++_msgId);
  _msgTexts[id] = text.replace(/<[^>]*>/g,'').replace(/\*\*/g,'').replace(/\*/g,'').replace(/[\u{1F300}-\u{1FFFF}]/gu,'').replace(/[\u{2600}-\u{27BF}]/gu,'').replace(/[💳📱📚🎓👤✅❌⚠️🔑📄🌍⏱→←]/g,'').trim();
  var html = text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^(\d+)\.\s+(.+)$/gm,'<div class="step"><b>$1.</b> $2</div>')
    .replace(/\n/g,'<br>');
  var L = T[_helpLang]||T.en;
  var div = document.createElement('div');
  div.className = 'msg '+role;
  div.innerHTML =
    '<div class="avatar '+role+'">'+(role==='ai'?'🎓':'👤')+'</div>'
    +'<div class="bubble '+role+'" id="'+id+'">'
      +html
      +(role==='ai'?'<button class="speak-btn" onclick="speakNow(_msgTexts[\''+id+'\'])">'+L.listen+'</button>':'')
    +'</div>';
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return id;
}

function showTyping(){
  var wrap=document.getElementById('chat-wrap');
  var el=document.createElement('div');
  el.id='typing';el.className='msg ai';
  el.innerHTML='<div class="avatar ai">🎓</div><div class="bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>';
  wrap.appendChild(el);wrap.scrollTop=wrap.scrollHeight;
}
function hideTyping(){var el=document.getElementById('typing');if(el)el.remove();}

// ── MIC ──────────────────────────────────────────────────────
function toggleMic(){
  var btn=document.getElementById('btn-mic');
  if(_micActive){_micActive=false;btn.classList.remove('active');btn.textContent='🎤';if(_recognition)try{_recognition.stop();}catch(e){}return;}
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){alert('Please use Chrome for microphone.');return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  _recognition=new SR();
  _recognition.lang=LANG_VOICE_CODE[_helpLang]||'en-GB';
  _recognition.continuous=false;_recognition.interimResults=true;
  _recognition.onstart=function(){_micActive=true;btn.classList.add('active');btn.textContent='⏹';};
  _recognition.onresult=function(e){var t='';for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;document.getElementById('help-input').value=t;};
  _recognition.onend=function(){_micActive=false;btn.classList.remove('active');btn.textContent='🎤';var v=document.getElementById('help-input').value.trim();if(v)sendHelp();};
  _recognition.onerror=function(){_micActive=false;btn.classList.remove('active');btn.textContent='🎤';};
  _recognition.start();
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px';}
document.getElementById('help-input').addEventListener('input',function(){autoResize(this);});
</script>
