<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Research / Professional — Smart Academy AI</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0f2044; --surface:#1a2332; --surface2:#162435;
  --border:rgba(255,255,255,0.1); --cyan:#06b6d4; --purple:#7c3aed;
  --text:#e2e8f0; --muted:rgba(255,255,255,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse 1200px 600px at 20% -10%, rgba(180,210,255,0.18), transparent 60%),
    radial-gradient(ellipse 900px 500px at 90% 15%, rgba(140,180,255,0.12), transparent 55%),
    linear-gradient(155deg, #0a1530 0%, #122a52 35%, #1c3868 55%, #142d5c 75%, #0d1f42 100%);
  background-attachment:fixed;
  color:var(--text);font-family:'DM Sans',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;
}

.nav{background:rgba(8,15,30,0.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(180,210,255,0.15);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:16px;font-weight:800;color:#fff;text-decoration:none;}
.nav-logo span{color:var(--cyan);}
.nav-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;}
#rt-lang-select option{background:#1a2332;color:#fff;}
.nav-btn:hover{background:rgba(255,255,255,0.06);color:#fff;}

#access-gate{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.access-card{background:linear-gradient(165deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));border:1px solid rgba(180,210,255,0.18);border-top:1px solid rgba(200,225,255,0.35);border-radius:20px;padding:36px 28px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);}
.access-icon{font-size:44px;margin-bottom:14px;}
.access-card h2{color:#fff;font-size:22px;font-weight:800;margin-bottom:8px;}
.access-card p{color:var(--muted);font-size:13px;margin-bottom:22px;line-height:1.6;}
.access-input{width:100%;padding:14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.06);color:#fff;font-size:15px;font-weight:700;text-align:center;outline:none;margin-bottom:12px;}
.access-error{color:#ef4444;font-size:12px;margin-bottom:12px;display:none;}
.access-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a56db,var(--purple));border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;}
.access-back{width:100%;padding:10px;margin-top:10px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;cursor:pointer;}

#main-content{flex:1;display:none;padding:24px 16px 60px;}
.content-inner{max-width:780px;margin:0 auto;}
.content-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.content-title{color:var(--cyan);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.content-title-main{color:#fff;font-size:20px;font-weight:800;margin-top:2px;}

.upload-zone{background:linear-gradient(165deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));border:1px solid rgba(180,210,255,0.18);border-top:1px solid rgba(200,225,255,0.35);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);}
.attach-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;padding:10px 18px;cursor:pointer;font-weight:600;}
.attach-btn:hover{background:rgba(255,255,255,0.08);color:#fff;}
.file-chip{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:6px;padding:5px 10px;font-size:11px;color:#10b981;display:inline-flex;align-items:center;gap:6px;margin:4px 4px 0 0;}
.file-chip button{background:none;border:none;color:#ef4444;cursor:pointer;font-size:13px;padding:0;}

.pdf-panel{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:14px;display:none;}
.pdf-thumbs{display:flex;gap:8px;overflow-x:auto;padding:6px 0;}
.pdf-thumb{flex-shrink:0;cursor:pointer;border:2px solid rgba(255,255,255,0.15);border-radius:6px;overflow:hidden;position:relative;background:rgba(255,255,255,0.04);}
.pdf-thumb.selected{border-color:var(--cyan);background:rgba(6,182,212,0.1);}
.pdf-thumb canvas{display:block;width:64px;height:86px;object-fit:cover;}
.pdf-thumb-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);font-size:9px;font-weight:700;color:#fff;text-align:center;padding:2px 0;}
.page-inputs{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;}
.page-inputs input{width:70px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:6px;color:#fff;padding:6px 8px;font-size:12px;text-align:center;outline:none;}
.page-inputs label{font-size:11px;color:var(--muted);}

textarea#question-input{width:100%;min-height:80px;padding:14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:#fff;font-size:14px;font-family:inherit;resize:vertical;outline:none;margin-top:14px;}
.analyze-btn{margin-top:12px;width:100%;padding:14px;background:linear-gradient(135deg,#1a56db,var(--cyan));border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
.analyze-btn:disabled{opacity:0.6;cursor:not-allowed;}

#results{margin-top:20px;display:none;}
@keyframes aiPulse{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1.2);opacity:1;}}
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
.loading-state{text-align:center;padding:30px 20px;}
.loading-dots{display:flex;justify-content:center;gap:8px;margin-bottom:18px;}
.loading-dot{width:14px;height:14px;border-radius:50%;background:var(--cyan);}
.loading-text{color:#cbd5e1;font-size:14px;font-weight:600;margin-bottom:4px;}
.loading-subtext{color:var(--muted);font-size:12px;}
.loading-bar-track{margin:18px auto 0;width:220px;height:4px;background:rgba(255,255,255,0.1);border-radius:999px;overflow:hidden;}
.loading-bar-fill{height:100%;width:100%;background:linear-gradient(90deg,#1a56db,#06b6d4,#1a56db);background-size:200% auto;border-radius:999px;animation:shimmer 1.5s ease infinite;}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:640px){.result-grid{grid-template-columns:1fr;}}
.result-panel{border-radius:10px;padding:16px;font-size:13px;line-height:1.6;}
.result-panel.gpt{background:rgba(26,86,219,0.08);border:1px solid rgba(26,86,219,0.25);}
.result-panel.claude{background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.25);}
.result-panel-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.result-merged{background:rgba(6,182,212,0.1);border:2px solid rgba(6,182,212,0.4);border-radius:12px;padding:18px;margin-top:12px;}
.scorecard{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.scorecard-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:10px;}
.scorecard-hero{text-align:center;padding:8px 0 12px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.scorecard-pct{font-size:40px;font-weight:900;line-height:1;}
.scorecard-label{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;}
.scorecard-verdict{display:inline-block;margin-top:8px;padding:4px 16px;border-radius:20px;font-size:13px;font-weight:800;background:rgba(255,255,255,0.06);}
.scorecard-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:500px){.scorecard-grid{grid-template-columns:repeat(3,1fr);}}
.score-item{text-align:center;}
.score-bar{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.score-bar-fill{height:100%;border-radius:3px;}
.score-val{font-size:14px;font-weight:800;}
.score-label{font-size:10px;color:var(--muted);margin-top:2px;}
.download-row{display:flex;gap:10px;margin-top:14px;}
.download-btn{flex:1;padding:10px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
.download-btn:hover{background:rgba(255,255,255,0.1);}
.result-merged-title{font-size:12px;font-weight:800;color:var(--cyan);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.result-merged-body{font-size:14px;color:#fff;line-height:1.7;}
</style>
</head>

<!-- ACCESS GATE -->
<div id="access-gate">
  <div class="access-card">
    <div class="access-icon">🔬</div>
    <h2 data-rt="gate_title">Research / Professional Access</h2>
    <p data-rt="gate_desc">Enter your Research access code (starts with RM-, RS-, or RY-) to unlock document analysis.</p>
    <input id="gate-code-input" class="access-input" type="text" placeholder="e.g. RM-XXXXXXX" maxlength="14"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter') verifyGate()">
    <div id="gate-error" class="access-error"></div>
    <button class="access-btn" onclick="verifyGate()" data-rt="unlock_btn">🚀 Unlock Research Mode</button>
    <button class="access-back" onclick="window.location.href='index.html'" data-rt="back_home_arrow">← Back to Home</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content">
  <div class="content-inner">
    <div class="content-header">
      <div>
        <div class="content-title">🔬 Research / Professional Mode</div>
        <div class="content-title-main" data-rt="doc_analysis">Document Analysis</div>
      </div>
    </div>

    <div class="upload-zone">
      <button class="attach-btn" id="attach-btn" data-rt="attach_files">📎 Attach files (PDF up to 30 pages, photos, Excel, Word)</button>
      <input type="file" id="attach-input" multiple accept=".csv,.xlsx,.xls,.pdf,.png,.jpg,.jpeg,.doc,.docx" style="display:none;">
      <div id="files-preview" style="margin-top:10px;"></div>

      <div class="pdf-panel" id="pdf-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:13px;font-weight:700;color:#fff;" data-rt="select_pages">📋 Select Page Range</span>
          <button onclick="clearAllFiles()" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:7px;color:#ef4444;font-size:11px;padding:4px 12px;cursor:pointer;" data-rt="clear_all">🗑️ Clear All</button>
        </div>
        <div class="pdf-thumbs" id="pdf-thumbs"></div>
        <div class="page-inputs">
          <label data-rt="from_lbl">From</label>
          <input type="number" id="pdf-from" min="1" value="1">
          <label data-rt="to_lbl">To</label>
          <input type="number" id="pdf-to" min="1" value="1">
          <button onclick="selectAllPages()" style="background:rgba(6,182,212,0.12);border:1px solid rgba(6,182,212,0.35);border-radius:7px;color:var(--cyan);font-size:11px;font-weight:700;padding:5px 12px;cursor:pointer;white-space:nowrap;">✓ Select All Pages</button>
          <span id="page-count-label" style="font-size:10px;color:var(--muted);"></span>
          <span style="font-size:10px;color:#f59e0b;" data-rt="max_pages">Max 30 pages</span>
        </div>
        <div id="pdf-status" style="font-size:11px;color:#10b981;margin-top:6px;display:none;"></div>
      </div>

      <textarea id="question-input" placeholder="Ask a question about your document (e.g. 'Summarize the key findings')" data-rt-ph="question_ph"></textarea>
      <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()" data-rt="analyze_btn">🔬 Analyze Document</button>
    </div>

    <div id="results"></div>
  </div>
</div>

async function verifyGate(){
  var input = document.getElementById('gate-code-input');
  var errEl = document.getElementById('gate-error');
  var code = input.value.trim().toUpperCase();
  errEl.style.display = 'none';

  if(!code){ errEl.textContent = 'Please enter your access code.'; errEl.style.display='block'; return; }
  if(!/^(RM|RS|RY)-[A-Z0-9]{4,12}$/.test(code)){ errEl.textContent = '❌ Code must start with RM-, RS-, or RY-'; errEl.style.display='block'; return; }

  // Bug fix: research TRIAL codes (RM-TRIALxxxxx, generated by the
  // homepage "Try Research Free" button) have a different data shape in
  // KV than normal paid RM-/RS-/RY- codes — they use deviceExpiry/
  // usedDevices and have no expiresAt set until first use, since each
  // device gets its own countdown starting from when THEY open this
  // page. Sending a trial code through the generic 'validate-code'
  // action made the worker try to compute a TTL from a missing
  // expiresAt, producing "Invalid expiration_ttl of 0" and failing
  // outright. Trial codes must go through 'validate-research-trial-code'
  // instead, which knows how to handle that shape correctly.
  var isTrialCode = /^RM-TRIAL/.test(code);

  // A stable per-browser fingerprint (persisted in localStorage) rather
  // than a fresh random value every call — required for the trial's
  // device-locking to actually recognize "this is the same device" on a
  // second attempt (e.g. page refresh), and harmless for normal codes
  // since validate-code intentionally skips device locking for RM-/RS-/
  // RY- types anyway.
  var fp = localStorage.getItem('prof_device_fp');
  if(!fp){
    fp = 'prof-' + Date.now() + '-' + Math.random().toString(36).slice(2,10);
    localStorage.setItem('prof_device_fp', fp);
  }

  try{
    var res = await fetch(MAIN_WORKER_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        _appSecret: MAIN_APP_SECRET,
        action: isTrialCode ? 'validate-research-trial-code' : 'validate-code',
        code: code,
        fingerprint: fp
      })
    });
    var data = await res.json();
    if(data.valid === true){
      sessionStorage.setItem('prof_unlocked','1');
      sessionStorage.setItem('prof_verified_code', code); // needed so analyze-document can check this code's spending limit
      document.getElementById('access-gate').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      initUploadHandlers();
    } else {
      errEl.textContent = '❌ ' + (data.message || data.error || 'Code not recognized.');
      errEl.style.display = 'block';
    }
  }catch(e){
    errEl.textContent = '⚠️ Could not verify code — check your connection.';
    errEl.style.display = 'block';
  }
}

  }

  // Auto-fill and verify a code passed from the Learner page's "Use" button

  var urlParams = new URLSearchParams(window.location.search);

function initUploadHandlers(){
  var attachBtn = document.getElementById('attach-btn');
  var attachInput = document.getElementById('attach-input');
  if(attachBtn._initialized) return; // avoid double-binding
  attachBtn._initialized = true;

  attachBtn.addEventListener('click', function(){ attachInput.click(); });
  attachInput.addEventListener('change', function(e){
    var rawFiles = Array.from(e.target.files);
    var hasPdf = rawFiles.some(function(f){ return f.name.toLowerCase().endsWith('.pdf'); });
    rawFiles.forEach(function(f){ attachedFiles.push(f); });
    renderFilesPreview();
    e.target.value = '';
    if(hasPdf){
      var pdfFile = rawFiles.find(function(f){ return f.name.toLowerCase().endsWith('.pdf'); });
      if(pdfFile) showPdfPanel(pdfFile);
    }
  });
}

function renderFilesPreview(){
  var preview = document.getElementById('files-preview');
  preview.innerHTML = attachedFiles.map(function(f,i){
    return '<span class="file-chip">' + f.name.substring(0,24) + '<button onclick="removeFile(' + i + ')">&times;</button></span>';
  }).join('');
}
function removeFile(i){
  attachedFiles.splice(i,1);
  renderFilesPreview();
  var hasPdf = attachedFiles.some(function(f){ return f.name.toLowerCase().endsWith('.pdf'); });
  if(!hasPdf) document.getElementById('pdf-panel').style.display = 'none';
}
function clearAllFiles(){
  attachedFiles = []; pdfDoc = null; pdfConfirmed = false;
  renderFilesPreview();
  document.getElementById('pdf-panel').style.display = 'none';
}

async function showPdfPanel(file){
  var panel = document.getElementById('pdf-panel');
  var thumbs = document.getElementById('pdf-thumbs');
  panel.style.display = 'block';
  thumbs.innerHTML = '<span style="font-size:11px;color:var(--muted);">Loading...</span>';

  try{
    var arrayBuf = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({data:arrayBuf}).promise;
    var numPages = pdfDoc.numPages;

    document.getElementById('pdf-from').value = 1;
    document.getElementById('pdf-to').value = Math.min(numPages, MAX_PDF_PAGES);
    document.getElementById('page-count-label').textContent = numPages + ' pages total';

    thumbs.innerHTML = '';
    var maxThumbs = Math.min(numPages, 40);
    for(var p=1; p<=maxThumbs; p++){
      var div = document.createElement('div');
      div.className = 'pdf-thumb'; div.dataset.page = p;
      var canvas = document.createElement('canvas');
      var label = document.createElement('div'); label.className='pdf-thumb-label'; label.textContent='P'+p;
      div.appendChild(canvas); div.appendChild(label);
      thumbs.appendChild(div);
      (function(pg, cv){
        pdfDoc.getPage(pg).then(function(page){
          var vp = page.getViewport({scale:0.3});
          cv.width = vp.width; cv.height = vp.height;
          page.render({canvasContext: cv.getContext('2d'), viewport: vp});
        });
      })(p, canvas);
      div.addEventListener('click', function(){ this.classList.toggle('selected'); });
    }
    if(numPages > maxThumbs){
      var more = document.createElement('span');
      more.style.cssText = 'font-size:10px;color:var(--muted);padding:10px;align-self:center;white-space:nowrap;';
      more.textContent = '+ ' + (numPages - maxThumbs) + ' more page(s) — use the From/To fields below to select beyond ' + maxThumbs;
      thumbs.appendChild(more);
    }
    validatePages();
  }catch(e){
    thumbs.innerHTML = '<span style="font-size:11px;color:var(--muted);">Preview unavailable.</span>';
  }
}

  if(!pdfDoc){ if(typeof toast === 'function') toast('Upload a PDF first', 'err'); return; }

function validatePages(){
  var fromEl = document.getElementById('pdf-from');
  var toEl = document.getElementById('pdf-to');
  var status = document.getElementById('pdf-status');
  var totalPages = pdfDoc ? pdfDoc.numPages : 999;
  var from = Math.max(1, Math.min(parseInt(fromEl.value)||1, totalPages));
  var to = Math.max(from, Math.min(parseInt(toEl.value)||1, totalPages));
  var count = to - from + 1;
  if(count > MAX_PDF_PAGES){ to = from + MAX_PDF_PAGES - 1; count = MAX_PDF_PAGES; }
  fromEl.value = from; toEl.value = to;
  pdfConfirmed = true;
  selectedPages = {from:from, to:to};
  status.textContent = '✓ ' + count + ' page(s) ready';
  status.style.display = 'block';
}

});

function readFileBase64(file){
  return new Promise(function(resolve,reject){
    var r = new FileReader();
    r.onload = function(){ resolve(r.result); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

async function runAnalysis(){
  var question = document.getElementById('question-input').value.trim();
  var resultsEl = document.getElementById('results');
  var btn = document.getElementById('analyze-btn');

  if(!question){ alert('Please enter a question.'); return; }
  if(!attachedFiles.length){ alert('Please upload a document first.'); return; }

  btn.disabled = true; btn.textContent = '⏳ Analyzing...';
  resultsEl.style.display = 'block';
  resultsEl.innerHTML =
    '<div class="loading-state">' +
      '<div class="loading-dots">' +
        '<div class="loading-dot" style="animation:aiPulse 1.2s ease infinite;"></div>' +
        '<div class="loading-dot" style="animation:aiPulse 1.2s ease infinite 0.2s;"></div>' +
        '<div class="loading-dot" style="animation:aiPulse 1.2s ease infinite 0.4s;"></div>' +
      '</div>' +
      '<div class="loading-text">🔬 Analyzing your document...</div>' +
      '<div class="loading-subtext">Running GPT-4o and Claude in parallel, then verifying — usually 20-40 seconds</div>' +
      '<div class="loading-bar-track"><div class="loading-bar-fill"></div></div>' +
    '</div>';

  // Auto-scroll so the loading indicator (and the results once ready) are
  // immediately visible — avoids the person having to scroll down manually
  // to see that analysis is actually running.
  setTimeout(function(){ resultsEl.scrollIntoView({behavior:'smooth', block:'start'}); }, 100);

  try{
    var images = []; var docText = '';
    for(var i=0;i<attachedFiles.length;i++){
      var f = attachedFiles[i];
      var ext = f.name.split('.').pop().toLowerCase();
      if(['png','jpg','jpeg'].includes(ext)){
        images.push(await readFileBase64(f));
      } else if(ext === 'pdf' && pdfDoc && pdfConfirmed){
        for(var p=selectedPages.from; p<=selectedPages.to; p++){
          var page = await pdfDoc.getPage(p);
          var vp = page.getViewport({scale:1.5});
          var canvas = document.createElement('canvas');
          canvas.width = vp.width; canvas.height = vp.height;
          await page.render({canvasContext: canvas.getContext('2d'), viewport: vp}).promise;
          images.push(canvas.toDataURL('image/jpeg', 0.85));
        }
      } else if(['xlsx','xls','csv'].includes(ext)){
        var buf = await f.arrayBuffer();
        var wb = XLSX.read(buf, {type:'array'});
        wb.SheetNames.forEach(function(sn){
          docText += '=== ' + f.name + ' | ' + sn + ' ===\n' + XLSX.utils.sheet_to_csv(wb.Sheets[sn]) + '\n\n';
        });
      } else if(['doc','docx'].includes(ext)){
        // Genuinely missing until now — extract real text via mammoth.js,
        // matching the proven approach already working on the Learner
        // side, but using text extraction (not canvas rendering) since
        // this feature already has a clean text-based docText pathway.
        if(typeof mammoth === 'undefined'){
          await new Promise(function(resolve, reject){
            var script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
            script.onload = resolve; script.onerror = reject;
            document.head.appendChild(script);
          });
        }
        var wordBuf = await f.arrayBuffer();
        var wordResult = await mammoth.extractRawText({arrayBuffer: wordBuf});
        docText += '=== ' + f.name + ' ===\n' + wordResult.value + '\n\n';
      }
    }

    var res = await fetch(PROF_WORKER_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({_appSecret: PROF_APP_SECRET, action:'analyze-document', question:question, images:images, docText:docText, code: sessionStorage.getItem('prof_verified_code')||''})
    });
    var data = await res.json();
    if(!data.ok){
      resultsEl.innerHTML = '<div style="color:#ef4444;padding:16px;">Error: ' + (data.error||'Unknown error') + '</div>';
      return;
    }
    renderResults(data);
  }catch(e){
    resultsEl.innerHTML = '<div style="color:#ef4444;padding:16px;">Error: ' + e.message + '</div>';
  }finally{
    btn.disabled = false; btn.textContent = '🔬 Analyze Document';
  }
}

function simpleMarkdown(text){
  return (text||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}

var lastResultData = null; // stored for download buttons

function buildScorecardHTML(sc){
  if(!sc) return '';
  var score = sc.overall_confidence || 0;
  var verdict = sc.verdict || '';
  var sc_color = score>=75?'#10b981':score>=55?'#f59e0b':'#ef4444';

  var metrics = [
    {k:'source_coverage', l:'Source Coverage'},
    {k:'factual_accuracy', l:'Factual Accuracy'},
    {k:'analysis_depth', l:'Analysis Depth'},
    {k:'agreement_level', l:'Model Agreement'},
    {k:'clarity', l:'Clarity'}
  ];

  var html = '<div class="scorecard"><div class="scorecard-title">Confidence Scorecard</div>';
  html += '<div class="scorecard-hero">';
  html += '<div class="scorecard-pct" style="color:'+sc_color+'">'+score+'<span style="font-size:18px;color:var(--muted)">%</span></div>';
  html += '<div class="scorecard-label">Overall Confidence</div>';
  if(verdict) html += '<div class="scorecard-verdict" style="color:'+sc_color+'">'+verdict+'</div>';
  html += '</div><div class="scorecard-grid">';
  metrics.forEach(function(m){
    var v = sc[m.k] || 0;
    var c = v>=75?'#10b981':v>=55?'#f59e0b':'#ef4444';
    html += '<div class="score-item"><div class="score-bar"><div class="score-bar-fill" style="width:'+v+'%;background:'+c+'"></div></div>'+
      '<div class="score-val" style="color:'+c+'">'+v+'%</div><div class="score-label">'+m.l+'</div></div>';
  });
  html += '</div>';

  if(sc.recommendations && sc.recommendations.length){
    var metricLabels = {source_coverage:'Source Coverage', factual_accuracy:'Factual Accuracy', analysis_depth:'Analysis Depth', agreement_level:'Model Agreement', clarity:'Clarity'};
    html += '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">';
    html += '<div style="font-size:11px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">💡 To Improve Confidence</div>';
    html += '<ul style="margin:0;padding-left:18px;">';
    sc.recommendations.forEach(function(r){
      var label = metricLabels[r.metric] || r.metric || '';
      var text = (typeof r === 'string') ? r : (r.text || '');
      html += '<li style="font-size:12px;color:#cbd5e1;line-height:1.6;margin-bottom:4px;"><strong style="color:#fbbf24;">'+label+':</strong> '+text+'</li>';
    });
    html += '</ul></div>';
  }

  html += '</div>';
  return html;
}
